global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    env: ${ENV:production}
    region: ${REGION:default}

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000
        labels:
          service: grafana

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
        labels:
          service: loki

  - job_name: blackbox
    static_configs:
      - targets:
          - blackbox-exporter:9115
        labels:
          service: blackbox-exporter

